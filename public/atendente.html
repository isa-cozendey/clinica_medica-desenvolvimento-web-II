<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recepção - Sistema Quero Saúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-escuro: #064e3b;
            --verde-principal: #22c55e;
            --verde-suave: #dcfce7;
            --branco: #ffffff;
            --fonte-titulo: 'Montserrat', sans-serif;
            --fonte-corpo: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--fonte-corpo); 
            background-color: #f8fafc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 95%;
        }

        /* Card de Cadastro */
        .card-cadastro { 
            flex: 1.2;
            background: var(--branco); 
            padding: 50px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        /* Card de Informações Lateral */
        .card-info {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-box {
            background: var(--verde-escuro);
            color: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
        }

        .stat-box h3 { margin: 0; font-family: var(--fonte-titulo); font-size: 1rem; opacity: 0.8; }
        .stat-box p { margin: 10px 0 0; font-family: var(--fonte-titulo); font-size: 3.5rem; font-weight: 900; }

        .info-box {
            background: var(--branco);
            padding: 25px;
            border-radius: 30px;
            border: 2px solid var(--verde-suave);
        }

        h2 { 
            font-family: var(--fonte-titulo);
            color: var(--verde-escuro); 
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 900;
            letter-spacing: -1.5px;
        }

        .subtitle { color: #64748b; margin-bottom: 40px; font-weight: 500; }

        label {
            display: block;
            font-family: var(--fonte-titulo);
            font-weight: 700;
            color: var(--verde-escuro);
            margin-bottom: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            margin-bottom: 25px; 
            border-radius: 18px; 
            border: 2px solid #e2e8f0; 
            box-sizing: border-box; 
            font-size: 1.2rem; 
            font-family: var(--fonte-corpo);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--verde-principal);
            background-color: #f0fdf4;
            box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.1);
        }

        button { 
            width: 100%;
            padding: 22px; 
            background-color: var(--verde-principal); 
            color: white; 
            border: none; 
            border-radius: 18px;
            font-family: var(--fonte-titulo);
            font-size: 1.3rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.4);
        }

        button:hover { 
            background-color: var(--verde-escuro);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(6, 78, 59, 0.3);
        }

        #msg { 
            text-align: center; 
            font-weight: 700; 
            color: var(--verde-principal);
            margin-top: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-cadastro">
            <h2>Recepção</h2>
            <p class="subtitle">Cadastro de pacientes</p>
            
            <label>Nome Completo</label>
            <input type="text" id="nome" autocomplete="off">
            
            <label>Tipo de Prioridade</label>
            <select id="prioridade">
                <option value="0">Atendimento Normal</option>
                <option value="1">Atendimento Prioritário</option>
            </select>

            <button onclick="cadastrar()">Confirmar</button>
            <p id="msg"></p>
        </div>

        <div class="card-info">
            <div class="stat-box">
                <h3>PACIENTES NA FILA</h3>
                <p id="countFila">0</p>
            </div>
            
            <div class="info-box">
                <strong style="color: var(--verde-escuro); display: block; margin-bottom: 10px; font-family: var(--fonte-titulo);">Último Registro:</strong>
                <span id="ultimoNome" style="color: #64748b;">Nenhum até agora</span>
            </div>

        </div>
    </div>

    <script>
        // Função para atualizar os dados da lateral (Polling)
        async function atualizarStats() {
            try {
                const resposta = await fetch('/status');
                const dados = await resposta.json();
                document.getElementById('countFila').innerText = dados.fila.length;
            } catch (e) { console.log("Erro ao buscar status"); }
        }

        async function cadastrar() {
            const nomeInput = document.getElementById('nome');
            const prioridade = document.getElementById('prioridade').value;
            const msg = document.getElementById('msg');
            const nome = nomeInput.value;

            if (!nome) return alert("Por favor, preencha o nome.");

            const resposta = await fetch('/adicionar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, prioridade })
            });

            if (resposta.ok) {
                msg.innerText = "✓ Registro concluído!";
                document.getElementById('ultimoNome').innerText = nome;
                nomeInput.value = ""; 
                nomeInput.focus();
                atualizarStats();
                setTimeout(() => { msg.innerText = ""; }, 3000);
            }
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') cadastrar(); });

        setInterval(atualizarStats, 3000);
        atualizarStats();
    </script>
</body>
</html>
